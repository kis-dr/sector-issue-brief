<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>섹터별 이슈 브리핑</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="assets/style.css?v=16">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <span class="brand-mark">KIS</span>
        <span class="brand-divider"></span>
        <span class="brand-name">섹터별 이슈 브리핑</span>
      </div>
      <div class="meta">
        <span class="date" id="trading-date">―</span>
        <span class="meta-divider">·</span>
        <span class="dept">디지털리서치팀</span>
      </div>
    </div>
  </header>

  <main class="container main-content">
    <section class="hero">
      <h1 class="hero-title">오늘의 섹터 이슈</h1>
      <p class="hero-sub">담당 섹터를 선택하여 상세 브리핑을 확인하세요.</p>
      <div class="search-bar">
        <input type="text" id="sector-search" placeholder="섹터명 검색 (예: 반도체, 조선, 화장품...)">
      </div>
    </section>

    <section class="sector-groups" id="sector-groups">
      <div class="loading-state" id="loading">데이터 로딩 중...</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>© 한국투자증권 자산관리전략부 디지털리서치팀</span>
      <span class="footer-divider">·</span>
      <span>내부용 / Internal Use Only</span>
    </div>
  </footer>

  <script src="assets/main.js?v=16"></script>
</body>
</html>
